<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400"
     xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes pulse  { 0%,100%{opacity:.55} 50%{opacity:1} }
    @keyframes glow   { 0%,100%{opacity:.7}  50%{opacity:1} }
    @keyframes blink  { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes drift  { 0%{transform:translateY(0)} 50%{transform:translateY(-4px)} 100%{transform:translateY(0)} }
    .asc  { animation: pulse 5s ease-in-out infinite }
    .star { animation: glow  2s ease-in-out infinite }
    .cur  { animation: blink .9s step-end infinite }
    .tag  { animation: drift 6s ease-in-out infinite }
  </style>

  <!-- Purple radial glow behind ASCII art -->
  <radialGradient id="rg" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#7c6fd4" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7c6fd4" stop-opacity="0"/>
  </radialGradient>

  <!-- Teal glow for вњ» -->
  <filter id="tglow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Soft glow for ASCII block -->
  <filter id="aglow" x="-10%" y="-20%" width="120%" height="140%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="400" fill="#04040c"/>

<!-- Dot grid -->
<pattern id="dp" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
  <circle cx="16" cy="16" r="0.8" fill="#00e5c0" opacity="0.07"/>
</pattern>
<rect width="800" height="400" fill="url(#dp)"/>

<!-- Purple glow halo -->
<ellipse cx="400" cy="185" rx="260" ry="120" fill="url(#rg)"/>

<!-- ASCII block letters -->
<g class="asc" filter="url(#aglow)"
   font-family="'JetBrains Mono','Fira Mono','SF Mono','Courier New',monospace"
   font-size="30" fill="#7c6fd4" text-anchor="middle" letter-spacing="1">
  <text x="400" y="138">в•”в•ђв•—в•”в•ђв•—в•”в•ђв•—в•¦в•”в•ђв•—</text>
  <text x="400" y="173">в• в•ђв•Јв•‘в•Ј в•‘ в•¦в•‘в•љв•ђв•—</text>
  <text x="400" y="208">в•© в•©в•љв•ђв•ќв•љв•ђв•ќв•©в•љв•ђв•ќ</text>
</g>

<!-- Divider -->
<line x1="240" y1="226" x2="560" y2="226" stroke="#1a1a28" stroke-width="1"/>

<!-- вњ» + wordmark -->
<g font-family="'JetBrains Mono','Fira Mono','SF Mono','Courier New',monospace"
   font-size="24" text-anchor="middle">
  <text class="star" x="353" y="260" fill="#00e5c0" font-weight="bold"
        filter="url(#tglow)">вњ»</text>
  <text x="400" y="260" fill="#e8e6f4" font-weight="bold">aegiscode</text>
</g>

<!-- Version chip -->
<rect x="546" y="244" width="52" height="18" rx="4" fill="#0d0d1a" stroke="#1a1a28" stroke-width="1"/>
<text x="572" y="257" text-anchor="middle"
      font-family="'JetBrains Mono','Fira Mono',monospace"
      font-size="10" fill="#44405a">v2.0.0</text>

<!-- Tagline -->
<text class="tag" x="400" y="290" text-anchor="middle"
      font-family="'JetBrains Mono','Fira Mono',monospace"
      font-size="12" fill="#2e2b42" letter-spacing="1">AI-powered terminal coding agent</text>

<!-- Blinking cursor -->
<rect class="cur" x="395" y="308" width="2" height="14" fill="#00e5c0"/>

<!-- Corner accents -->
<polyline points="20,40 20,20 40,20"   fill="none" stroke="#1a1a28" stroke-width="1.5"/>
<polyline points="760,20 780,20 780,40" fill="none" stroke="#1a1a28" stroke-width="1.5"/>
<polyline points="20,360 20,380 40,380" fill="none" stroke="#1a1a28" stroke-width="1.5"/>
<polyline points="760,380 780,380 780,360" fill="none" stroke="#1a1a28" stroke-width="1.5"/>
</svg>
