name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: aegiscode-linux
          - os: windows-latest
            target: win-x64
            artifact: aegiscode.exe
          - os: macos-latest
            target: macos-x64
            artifact: aegiscode-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Build standalone binary
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx pkg dist/main.js --targets node22-${{ matrix.target }} --output ${{ matrix.artifact }} --compress Brotli

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # Only build .deb on tag pushes
  deb:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build
      - run: npx pkg dist/main.js --targets node22-linux-x64 --output aegiscode-linux --compress Brotli

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p deb-build/aegiscode_${VERSION}-1_amd64/DEBIAN
          mkdir -p deb-build/aegiscode_${VERSION}-1_amd64/usr/bin
          mkdir -p deb-build/aegiscode_${VERSION}-1_amd64/usr/share/doc/aegiscode
          cat > deb-build/aegiscode_${VERSION}-1_amd64/DEBIAN/control <<EOF
          Package: aegiscode
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: $(node -e "console.log(require('./package.json').author || 'AEGIS Team')")
          Description: AEGIS CLI - An AI-powered coding assistant
           A CLI coding agent that can read, write, and execute code.
          EOF
          cp aegiscode-linux deb-build/aegiscode_${VERSION}-1_amd64/usr/bin/aegiscode
          chmod 755 deb-build/aegiscode_${VERSION}-1_amd64/usr/bin/aegiscode
          [ -f LICENSE ] && cp LICENSE deb-build/aegiscode_${VERSION}-1_amd64/usr/share/doc/aegiscode/ || true
          dpkg-deb --build deb-build/aegiscode_${VERSION}-1_amd64

      - uses: actions/upload-artifact@v4
        with:
          name: aegiscode_${{ github.ref_name }}_amd64.deb
          path: deb-build/aegiscode_*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build, deb]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: aegiscode-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            aegiscode-linux
            aegiscode.exe
            aegiscode-macos
            aegiscode_*.deb
          generate_release_notes: true
