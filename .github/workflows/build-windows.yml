name: Build Windows MSI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CLI bundle
        run: npm ci && node esbuild.mjs

      - name: Install GUI deps (skip native postinstall)
        working-directory: gui
        run: npm ci --ignore-scripts

      - name: Compile node-pty for Electron
        working-directory: gui
        shell: bash
        env:
          GYP_MSVS_VERSION: '2022'
        run: npx --yes @electron/rebuild@latest -f -w @homebridge/node-pty-prebuilt-multiarch

      - name: Build MSI
        working-directory: gui
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: node build-prod.mjs --win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: aegis-gui-msi
          path: gui/dist/*.msi
          retention-days: 7

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: gui/dist/*.msi
