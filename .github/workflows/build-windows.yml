name: Build Windows MSI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CLI bundle
        run: npm ci && node esbuild.mjs

      - name: Install GUI deps (skip native postinstall)
        working-directory: gui
        run: npm ci --ignore-scripts

      - name: Compile node-pty for Electron
        working-directory: gui
        shell: bash
        env:
          GYP_MSVS_VERSION: '2022'
        run: npx --yes @electron/rebuild@latest -f -w @homebridge/node-pty-prebuilt-multiarch

      - name: Build MSI
        working-directory: gui
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: node build-prod.mjs --win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: aegis-gui-msi
          path: gui/dist/*.msi
          retention-days: 7

      - name: Deploy to Cloudflare R2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          CF_BUCKET: ${{ secrets.CF_R2_BUCKET }}
        run: |
          MSI=$(ls gui/dist/*.msi | head -1)
          npx --yes wrangler r2 object put "${CF_BUCKET}/aegis-gui-setup.msi" \
            --file "$MSI" \
            --content-type "application/octet-stream" \
            --remote
