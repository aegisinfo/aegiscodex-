name: Build Windows MSI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CLI bundle
        run: npm ci && node esbuild.mjs

      - name: Install GUI deps (skip native postinstall)
        working-directory: gui
        run: npm ci --ignore-scripts

      - name: Download node-pty Electron prebuild
        working-directory: gui
        shell: bash
        run: |
          ELECTRON_VER=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Electron $ELECTRON_VER"
          cd node_modules/@homebridge/node-pty-prebuilt-multiarch
          npm_config_runtime=electron \
          npm_config_target=$ELECTRON_VER \
          npm_config_disturl=https://electronjs.org/headers \
            npx prebuild-install

      - name: Build MSI
        working-directory: gui
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: node build-prod.mjs --win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-gui-msi
          path: gui/dist/*.msi
          retention-days: 30

      - name: Deploy to aegis1
        shell: bash
        env:
          AEGIS1_TOKEN: ${{ secrets.AEGIS1_TOKEN }}
        run: |
          MSI=$(ls gui/dist/*.msi | head -1)
          git clone https://x-access-token:${AEGIS1_TOKEN}@github.com/aegisinfo/aegis1.git aegis1-repo
          mkdir -p aegis1-repo/static/downloads
          cp "$MSI" aegis1-repo/static/downloads/aegis-gui-setup.msi
          cd aegis1-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add static/downloads/aegis-gui-setup.msi
          git commit -m "deploy: update aegis-gui-setup.msi [skip ci]"
          git push
