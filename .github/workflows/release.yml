name: Build & Release
on:
  push:
    branches: [main, stable-plus]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Package release
        run: |
          mkdir -p release
          cp dist/main.js release/aegiscode.js
          cp install.sh release/install.sh
          cp README.md release/README.md
          cp package.json release/package.json
          cp package-lock.json release/package-lock.json
          cp .env.example release/.env.example 2>/dev/null || true
          cd release && npm ci --omit=dev
          cd .. && zip -r aegiscode.zip release/
      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: aegiscode
          path: aegiscode.zip
          retention-days: 7
      - name: Deploy to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          CF_BUCKET: ${{ secrets.CF_R2_BUCKET }}
        run: |
          npx --yes wrangler r2 object put "${CF_BUCKET}/aegiscode.zip" \
            --file aegiscode.zip \
            --content-type "application/zip" \
            --remote
          npx --yes wrangler r2 object put "${CF_BUCKET}/install.sh" \
            --file release/install.sh \
            --content-type "text/x-shellscript" \
            --remote
          npx --yes wrangler r2 object put "${CF_BUCKET}/aegiscode.js" \
            --file release/aegiscode.js \
            --content-type "application/javascript" \
            --remote
          echo "${{ github.sha }}" | npx --yes wrangler r2 object put "${CF_BUCKET}/version.txt" \
            --content-type "text/plain" \
            --remote \
            --pipe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: aegiscode.zip
          generate_release_notes: true
