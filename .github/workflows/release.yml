name: Build & Release
on:
  push:
    branches: [main, stable-plus]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Package release
        run: |
          mkdir -p release
          cp dist/main.js release/aegiscode.js
          cp install.sh release/install.sh
          cp README.md release/README.md
          cp package.json release/package.json
          cp package-lock.json release/package-lock.json
          cp .env.example release/.env.example 2>/dev/null || true
          cd release && npm ci --omit=dev
          cd .. && zip -r aegiscode.zip release/
      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: aegiscode
          path: aegiscode.zip
          retention-days: 7
      - name: Deploy to aegis1
        env:
          AEGIS1_TOKEN: ${{ secrets.AEGIS1_TOKEN }}
        run: |
          if [ -z "${AEGIS1_TOKEN}" ]; then echo "No AEGIS1_TOKEN set — skipping deploy"; exit 0; fi
          git clone https://x-access-token:${AEGIS1_TOKEN}@github.com/aegisinfo/aegis1.git aegis1-repo
          mkdir -p aegis1-repo/static/downloads
          cp aegiscode.zip aegis1-repo/static/downloads/aegiscode.zip
          cp release/install.sh aegis1-repo/static/downloads/install.sh
          cp release/aegiscode.js aegis1-repo/static/downloads/aegiscode.js
          cd aegis1-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -f static/downloads/aegiscode.zip static/downloads/install.sh static/downloads/aegiscode.js
          git commit -m "deploy: update stable CLI artifacts [skip ci]"
          git push

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: aegiscode.zip
          generate_release_notes: true
