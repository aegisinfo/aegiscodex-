name: Build & Release
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Package release
        run: |
          mkdir -p release
          cp dist/main.js release/aegiscode.js
          cp install.sh release/install.sh
          cp README.md release/README.md
          cp package.json release/package.json
          cp package-lock.json release/package-lock.json
          cp .env.example release/.env.example 2>/dev/null || true
          cd release && npm ci --omit=dev
          cd .. && zip -r aegiscode-release.zip release/
      - uses: actions/upload-artifact@v4
        with:
          name: aegiscode-release
          path: aegiscode-release.zip
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: aegiscode-release.zip
          generate_release_notes: true
