name: Build Linux DEB

on:
  push:
    branches: [main, stable-plus]
  workflow_dispatch:

permissions:
  contents: write  # needed for softprops/action-gh-release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build CLI bundle
        run: npm ci && node esbuild.mjs

      - name: Install GUI deps (skip native postinstall)
        working-directory: gui
        run: npm ci --ignore-scripts

      - name: Compile node-pty for Electron
        working-directory: gui
        run: npx --yes @electron/rebuild@latest -f -w @homebridge/node-pty-prebuilt-multiarch

      - name: Build DEB
        working-directory: gui
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: node build-prod.mjs --linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: aegis-gui-deb
          path: gui/dist/*.deb
          retention-days: 30

      - name: Publish to GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: gui/dist/*.deb

      - name: Deploy to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          CF_BUCKET: ${{ secrets.CF_R2_BUCKET }}
        run: |
          DEB=$(ls gui/dist/*.deb | head -1)
          npx --yes wrangler r2 object put "${CF_BUCKET}/aegis-gui.deb" \
            --file "$DEB" \
            --content-type "application/octet-stream" \
            --remote
