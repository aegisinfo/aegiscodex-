<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AEGIS Code</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060a;--surface:#080c12;--surface2:#0c1018;
  --border:#1c2333;--border2:#2a3a50;
  --text:#c8d8e8;--text2:#6a8aaa;--text3:#2e4055;
  --teal:#00c8b4;--purple:#5a7fd4;--green:#1ab87a;
  --red:#e04444;--amber:#e89020;
  --sidebar:200px;
  --lattice:
    repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,180,200,.04) 28px,rgba(0,180,200,.04) 29px),
    repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(0,180,200,.04) 28px,rgba(0,180,200,.04) 29px);
}

html,body{height:100vh;background:var(--bg);color:var(--text);font-family:"Segoe UI",system-ui,sans-serif;font-size:13px;overflow:hidden}

.workspace{display:grid;grid-template-columns:var(--sidebar) 1fr;grid-template-rows:40px 1fr;height:100vh;background:var(--bg);background-image:var(--lattice)}

/* Titlebar */
.titlebar{grid-column:1/-1;display:flex;align-items:center;padding:0 16px;gap:10px;background:linear-gradient(180deg,#0f1824 0%,#080c12 100%);border-bottom:1px solid var(--border);-webkit-app-region:drag;user-select:none}
.titlebar-logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#00c8b4,#5a7fd4,#00c8b4);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;letter-spacing:.04em}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
.titlebar-sub{font-size:11px;color:var(--text3);letter-spacing:.05em}
.titlebar-spacer{flex:1}
.titlebar-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:8px 0;overflow:hidden}
.nav-section{padding:12px 12px 4px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:var(--text2);font-size:12px;border-left:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(0,200,180,.05);color:var(--text)}
.nav-item.active{color:var(--teal);border-left-color:var(--teal);background:rgba(0,200,180,.06)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-spacer{flex:1}
.nav-version{padding:8px 14px;font-size:10px;color:var(--text3)}

/* Content */
.content{overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* Panels */
.panel{display:none;flex-direction:column;height:100%;overflow:hidden}
.panel.active{display:flex}

/* ── Terminal panel ── */
#tab-terminal{background:#000;position:relative}
.terminal-wrap{flex:1;overflow:hidden;padding:4px}
#xterm-container{width:100%;height:100%}
.terminal-toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.terminal-toolbar button{font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.terminal-toolbar button:hover{background:rgba(0,200,180,.1);color:var(--teal);border-color:var(--teal)}
.terminal-toolbar button.active-btn{background:rgba(0,200,180,.12);color:var(--teal);border-color:var(--teal)}
.terminal-toolbar .sep{color:var(--text3);margin:0 2px}
.terminal-model{margin-left:auto;font-size:11px;color:var(--text3)}

/* ── Settings panel ── */
#tab-settings{padding:24px;overflow-y:auto}
.settings-section{margin-bottom:28px}
.settings-section h3{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;letter-spacing:.03em}
.field input,.field select{width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--teal)}
.field input::placeholder{color:var(--text3)}
.btn{padding:7px 16px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--teal);color:var(--teal);background:rgba(0,200,180,.07)}
.btn-primary{background:rgba(0,200,180,.12);color:var(--teal);border-color:var(--teal)}
.btn-primary:hover{background:rgba(0,200,180,.2)}
.save-note{font-size:11px;color:var(--green);margin-top:6px;display:none}

/* ── History panel ── */
#tab-history{overflow-y:auto;padding:16px}
.history-item{display:flex;align-items:center;gap:10px;padding:10px 12px;margin-bottom:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s}
.history-item:hover{border-color:var(--border2);background:var(--surface2)}
.history-item:hover .history-resume{opacity:1}
.history-icon{font-size:16px;opacity:.5}
.history-info{flex:1;min-width:0}
.history-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-id{font-size:10px;color:var(--text3);margin-top:2px;font-family:monospace}
.history-resume{font-size:10px;color:var(--teal);opacity:0;transition:opacity .15s}
.history-empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:12px}

/* ── Cloud panel ── */
#tab-cloud{padding:24px;overflow-y:auto}
.cloud-status{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px}
.cloud-dot{width:10px;height:10px;border-radius:50%}
.cloud-label{font-size:13px;font-weight:600}
.cloud-sub{font-size:11px;color:var(--text2);margin-left:auto}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text2)}
.info-val{color:var(--text);font-family:monospace;font-size:11px}
.cloud-actions{margin-top:20px;display:flex;gap:8px;flex-wrap:wrap}

/* ── Memory panel ── */
#tab-memory{overflow:hidden;display:flex;flex-direction:column}
.memory-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.memory-search{flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.memory-search:focus{border-color:var(--teal)}
.memory-search::placeholder{color:var(--text3)}
.memory-stats{display:flex;gap:20px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.mem-stat{text-align:center}
.mem-stat-val{font-size:18px;font-weight:700;color:var(--teal)}
.mem-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.memory-list{flex:1;overflow-y:auto;padding:8px}
.mem-entry{padding:10px 12px;margin-bottom:5px;background:var(--surface);border:1px solid var(--border);border-radius:6px;transition:border-color .15s}
.mem-entry:hover{border-color:var(--border2)}
.mem-entry-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.mem-tag{font-size:10px;padding:1px 7px;border-radius:999px;border:1px solid}
.mem-tag-user{color:var(--purple);border-color:rgba(90,127,212,.35);background:rgba(90,127,212,.08)}
.mem-tag-assistant{color:var(--teal);border-color:rgba(0,200,180,.35);background:rgba(0,200,180,.08)}
.mem-tag-other{color:var(--text3);border-color:var(--border)}
.mem-ts{font-size:10px;color:var(--text3);margin-left:auto}
.mem-content{font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:80px;overflow:hidden;position:relative}
.mem-content.expanded{max-height:none}
.mem-expand{font-size:10px;color:var(--teal);cursor:pointer;margin-top:3px;display:none}
.mem-session{font-size:10px;color:var(--text3);margin-top:4px;font-family:monospace}
.nav-badge{margin-left:auto;font-size:10px;color:var(--text3);font-family:monospace}
.memory-empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:12px}
</style>

<!-- xterm.js CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
</head>
<body>
<div class="workspace">

  <!-- Titlebar -->
  <div class="titlebar">
    <span class="titlebar-logo">AEGIS CODE</span>
    <span class="titlebar-sub">/ desktop</span>
    <div class="titlebar-spacer"></div>
    <div class="titlebar-status">
      <div class="status-dot" id="pty-dot"></div>
      <span id="pty-status">idle</span>
    </div>
  </div>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-section">Workspace</div>
    <div class="nav-item active" data-tab="terminal" onclick="switchTab('terminal')">
      <span class="nav-icon">⌨</span> Terminal
    </div>
    <div class="nav-item" data-tab="history" onclick="switchTab('history')">
      <span class="nav-icon">◷</span> History
    </div>
    <div class="nav-item" data-tab="memory" onclick="switchTab('memory')">
      <span class="nav-icon">⬡</span> Memory
      <span class="nav-badge" id="memory-badge"></span>
    </div>

    <div class="nav-section" style="margin-top:8px">Account</div>
    <div class="nav-item" data-tab="cloud" onclick="switchTab('cloud')">
      <span class="nav-icon">⬡</span> Cloud
    </div>
    <div class="nav-item" data-tab="settings" onclick="switchTab('settings')">
      <span class="nav-icon">⚙</span> Settings
    </div>

    <div class="nav-spacer"></div>
    <div class="nav-version" id="nav-version"></div>
  </nav>

  <!-- Content -->
  <div class="content">

    <!-- Terminal -->
    <div class="panel active" id="tab-terminal">
      <div class="terminal-toolbar">
        <button onclick="restartPty()" title="Restart session">↺ New session</button>
        <span class="sep">·</span>
        <button onclick="resumePty()" title="Resume last session">⟳ Resume</button>
        <span class="sep">·</span>
        <button onclick="killPty()" title="Kill process">✕ Kill</button>
        <span class="terminal-model" id="terminal-model"></span>
      </div>
      <div class="terminal-wrap">
        <div id="xterm-container"></div>
      </div>
    </div>

    <!-- History -->
    <div class="panel" id="tab-history">
      <div id="history-list"></div>
    </div>

    <!-- Memory -->
    <div class="panel" id="tab-memory">
      <div class="memory-toolbar">
        <input class="memory-search" id="memory-search" placeholder="Search memory…" oninput="onMemorySearch(this.value)">
        <button class="btn" onclick="loadMemory()">↺</button>
        <button class="btn" style="color:var(--red);border-color:var(--red)" onclick="confirmClearMemory()">Clear all</button>
      </div>
      <div class="memory-stats" id="memory-stats"></div>
      <div class="memory-list" id="memory-list"></div>
    </div>

    <!-- Cloud -->
    <div class="panel" id="tab-cloud">
      <div id="cloud-content"></div>
    </div>

    <!-- Settings -->
    <div class="panel" id="tab-settings">
      <div class="settings-section">
        <h3>AI Model</h3>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="s-apikey" placeholder="sk-ant-...">
        </div>
        <div class="field">
          <label>Model</label>
          <input type="text" id="s-model" placeholder="claude-sonnet-4-6">
        </div>
        <div class="field">
          <label>Base URL <span style="color:var(--text3)">(optional)</span></label>
          <input type="text" id="s-baseurl" placeholder="https://api.anthropic.com">
        </div>
      </div>
      <div class="settings-section">
        <h3>AEGIS Cloud</h3>
        <div class="field">
          <label>Cloud API Key</label>
          <input type="password" id="s-cloudkey" placeholder="aegis_...">
        </div>
        <div class="field">
          <label>Auto-upload on exit</label>
          <select id="s-cloudsync">
            <option value="on">Enabled</option>
            <option value="off">Disabled</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary" onclick="saveSettings()">Save settings</button>
        <span class="save-note" id="save-note">✓ Saved</span>
      </div>
    </div>

  </div><!-- .content -->
</div><!-- .workspace -->

<script src="app.js"></script>
</body>
</html>
