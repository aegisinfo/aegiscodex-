<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="index, follow">
<meta name="description" content="AEGIS Code standalone terminal — multi-model AI coding assistant with cross-session memory. Works with Claude, GPT-4o, Gemini, Ollama, DeepSeek.">
<meta name="keywords" content="AI terminal, coding assistant, aegiscode, Claude Code, AI pair programmer, developer tools, terminal AI">
<link rel="canonical" href="https://aegiscloud.org">
<!-- Open Graph -->
<meta property="og:title" content="AEGIS Code Terminal — AI Coding Sidekick With Memory">
<meta property="og:description" content="Cross-session memory for Claude, GPT-4o, Gemini & more. Free to start, €2/mo for Pro.">
<meta property="og:url" content="https://aegiscloud.org">
<meta property="og:type" content="website">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AEGIS Code Terminal — AI With Memory">
<meta name="twitter:description" content="Never re-explain your codebase. Cross-session memory. Free to start, €2/mo.">
<title>AEGIS Code Terminal — Multi-Model AI Coding Assistant With Memory</title>
<link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
<script defer src="../node_modules/@xterm/xterm/lib/xterm.js"></script>
<script defer src="../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
<script defer src="../node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
<script defer src="../node_modules/@xterm/addon-webgl/lib/addon-webgl.js"></script>
<script defer src="../node_modules/@xterm/addon-unicode11/lib/addon-unicode11.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--teal:#00c8b4;--text2:#6a8aaa;--border:#1c2333;
  --surface:#080c12;
}
html,body{height:100vh;background:var(--bg);overflow:hidden;font-family:"Segoe UI",system-ui,sans-serif}

.titlebar{
  height:36px;display:flex;align-items:center;padding:0 12px;gap:10px;
  background:linear-gradient(180deg,#0f1824 0%,#080c12 100%);
  border-bottom:1px solid var(--border);
  -webkit-app-region:drag;user-select:none;flex-shrink:0
}
.titlebar-logo{font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.04em;opacity:.8}
.titlebar-spacer{flex:1}
.tb-btn{
  font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;
  font-family:inherit;-webkit-app-region:no-drag
}
.tb-btn:hover{background:rgba(0,200,180,.1);color:var(--teal);border-color:var(--teal)}
.tb-cta{
  font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--teal);
  background:rgba(0,200,180,.12);color:var(--teal);cursor:pointer;transition:all .15s;
  font-family:inherit;-webkit-app-region:no-drag;font-weight:600
}
.tb-cta:hover{background:var(--teal);color:#000}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text2);transition:background .3s;flex-shrink:0}
.status-dot.on{background:#1ab87a;box-shadow:0 0 6px #1ab87a}

#xterm-wrap{height:calc(100vh - 36px);background:#000}
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-logo">ÆGIS</span>
  <div class="status-dot" id="status-dot"></div>
  <div class="titlebar-spacer"></div>
  <button class="tb-cta" onclick="require('electron').shell.openExternal('https://aegiscloud.org/#pricing')">✦ Subscribe €2/mo</button>
  <button class="tb-btn" onclick="newSession()">↺ New session</button>
  <button class="tb-btn" onclick="TERM.kill(); window.close()">✕ Close</button>
</div>

<div id="xterm-wrap"></div>

<script>
window.addEventListener("DOMContentLoaded", () => {
  const wrap = document.getElementById("xterm-wrap");
  const dot  = document.getElementById("status-dot");

  const term = new Terminal({
    fontFamily: '"Cascadia Code","Fira Code","JetBrains Mono","Consolas",monospace',
    fontWeight: "400",
    fontWeightBold: "700",
    fontSize:   13,
    lineHeight: 1.25,
    cursorBlink: true,
    cursorStyle: "block",
    theme: {
      background:    "#000000",
      foreground:    "#c8d8e8",
      cursor:        "#00c8b4",
      cursorAccent:  "#000000",
      selectionBackground: "rgba(0,200,180,.25)",
      black:   "#04060a", red:     "#e04444", green:   "#1ab87a", yellow:  "#e89020",
      blue:    "#5a7fd4", magenta: "#a06ad4", cyan:    "#00c8b4", white:   "#c8d8e8",
      brightBlack:   "#2e4055", brightRed:     "#f06060", brightGreen:  "#20d890",
      brightYellow:  "#f0a030", brightBlue:    "#7a9fe4", brightMagenta:"#c090e0",
      brightCyan:    "#20e0d0", brightWhite:   "#e8f0f8",
    },
    scrollback: 5000,
    rightClickSelectsWord: true,
    fastScrollModifier: "shift",
    macOptionIsMeta: true,
    drawBoldTextInBrightColors: false,
    rescaleOverlappingGlyphs: true,
    allowTransparency: false,
    minimumContrastRatio: 1,
  });

  const fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(wrap);

  // WebGL renderer
  try {
    if (typeof Unicode11Addon !== "undefined") {
      term.loadAddon(new Unicode11Addon.Unicode11Addon());
      term.unicode.activeVersion = "11";
    }
    const gl = new WebglAddon.WebglAddon();
    gl.onContextLoss(() => gl.dispose());
    term.loadAddon(gl);
  } catch (_) {}

  requestAnimationFrame(() => fit.fit());

  const ro = new ResizeObserver(() => {
    requestAnimationFrame(() => {
      try {
        fit.fit();
        const { cols, rows } = term;
        if (cols > 0 && rows > 0) TERM.resize(cols, rows);
      } catch (_) {}
    });
  });
  ro.observe(wrap);

  TERM.onData(data => term.write(data));

  TERM.onExit(code => {
    dot.classList.remove("on");
    term.writeln(`\r\n\x1b[2m[process exited with code ${code}]\x1b[0m`);
    term.writeln(`\x1b[2m[press any key or click ↺ New session to restart]\x1b[0m`);
  });

  TERM.onError(msg => {
    term.writeln(`\r\n\x1b[31m✗ ${msg}\x1b[0m`);
  });

  term.onData(data => TERM.write(data));

  term.onKey(() => {
    if (!dot.classList.contains("on")) newSession();
  });

  // Ctrl+C: copy if selection, otherwise pass through
  term.attachCustomKeyEventHandler(e => {
    if (e.type !== "keydown") return true;
    if (e.ctrlKey && (e.key === "c" || e.key === "C") && term.hasSelection()) {
      const sel = term.getSelection();
      if (sel) { navigator.clipboard?.writeText(sel).catch(() => {}); term.clearSelection(); }
      return false;
    }
    return true;
  });

  dot.classList.add("on");

  const welcomeBanner = () => {
    const cols = term.cols || 80;
    const bar = "\u2501".repeat(Math.min(cols, 60));
    term.writeln(`\r\n`);
    term.writeln(`  \x1b[1;36m\u00c6GIS Code Terminal\x1b[0m`);
    term.writeln(`  \x1b[2m${bar}\x1b[0m`);
    term.writeln(`  \x1b[90mFree to start \u00b7 \x1b[1;36m\u20ac2/mo to remember everything\x1b[0m`);
    term.writeln(`  \x1b[90mvs Claude Code $20/mo \u00b7 Cursor $20/mo \u00b7 aider free\x1b[0m`);
    term.writeln(`  \x1b[90m${bar}\x1b[0m`);
    term.writeln(`  \x1b[90mUpgrade at \x1b[4;36maegiscloud.org\x1b[0m`);
    term.writeln(`\r\n`);
    term.write(`\x1b[2m$\x1b[0m `);
  };

  window.newSession = () => {
    term.clear();
    TERM.respawn(term.cols, term.rows);
    dot.classList.add("on");
    welcomeBanner();
  };
});
</script>
</body>
</html>
