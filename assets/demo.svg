<?xml version="1.0" encoding="UTF-8"?>
<!--
  aegiscode demo animation
  10s looping cycle:
    0-82%  elements reveal sequentially
    83-90% everything holds visible
    91-99% everything fades out
    100%   restart
-->
<svg width="860" height="520" viewBox="0 0 860 520"
     xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    /* Reveal at N%, hold until 83%, fade out 91%→99%, gap→restart */
    @keyframes f03  {0%,2%{opacity:0}  4%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f05  {0%,4%{opacity:0}  6%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f07  {0%,6%{opacity:0}  8%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f09  {0%,8%{opacity:0} 10%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f11  {0%,10%{opacity:0}12%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f14  {0%,13%{opacity:0}15%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f17  {0%,16%{opacity:0}18%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f20  {0%,19%{opacity:0}21%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f23  {0%,22%{opacity:0}24%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f26  {0%,25%{opacity:0}27%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f29  {0%,28%{opacity:0}30%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f32  {0%,31%{opacity:0}33%,83%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f36  {0%,35%{opacity:0}37%,83%{opacity:1} 91%,100%{opacity:0}}

    /* Slide-in variants for AI output lines */
    @keyframes s44  {0%,43%{opacity:0;transform:translateY(5px)} 46%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}
    @keyframes s49  {0%,48%{opacity:0;transform:translateY(5px)} 51%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}
    @keyframes s54  {0%,53%{opacity:0;transform:translateY(5px)} 56%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}
    @keyframes s60  {0%,59%{opacity:0;transform:translateY(5px)} 62%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}
    @keyframes s66  {0%,65%{opacity:0;transform:translateY(5px)} 68%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}
    @keyframes s72  {0%,71%{opacity:0;transform:translateY(5px)} 74%,83%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0;transform:translateY(0)}}

    /* Cursor blink — independent of the main cycle */
    @keyframes blink {0%,49%{opacity:1} 50%,100%{opacity:0}}

    .l1  {animation:f03 10s linear infinite}
    .l2  {animation:f05 10s linear infinite}
    .l3  {animation:f07 10s linear infinite}
    .l4  {animation:f09 10s linear infinite}
    .l5  {animation:f11 10s linear infinite}
    .l6  {animation:f14 10s linear infinite}
    .l7  {animation:f17 10s linear infinite}
    .l8  {animation:f20 10s linear infinite}
    .l9  {animation:f23 10s linear infinite}
    .l10 {animation:f26 10s linear infinite}
    .l11 {animation:f29 10s linear infinite}
    .l12 {animation:f32 10s linear infinite}
    .inp {animation:f36 10s linear infinite}
    .t1  {animation:s44 10s linear infinite}
    .t2  {animation:s49 10s linear infinite}
    .t3  {animation:s54 10s linear infinite}
    .r1  {animation:s60 10s linear infinite}
    .r2  {animation:s66 10s linear infinite}
    .r3  {animation:s72 10s linear infinite}
    .cur {animation:f36 10s linear infinite, blink 0.9s step-end infinite}
  </style>
  <clipPath id="win"><rect width="860" height="520" rx="10"/></clipPath>
</defs>

<!-- Window background -->
<rect width="860" height="520" rx="10" fill="#04040c"/>

<!-- Title bar -->
<rect width="860" height="38" rx="10" fill="#08080f" clip-path="url(#win)"/>
<rect y="28" width="860" height="10" fill="#08080f"/>
<rect y="37" width="860" height="1" fill="#12121e"/>

<!-- Traffic lights -->
<circle cx="18" cy="19" r="5.5" fill="#ff5f57"/>
<circle cx="36" cy="19" r="5.5" fill="#febc2e"/>
<circle cx="54" cy="19" r="5.5" fill="#28c840"/>

<!-- Window title -->
<text x="430" y="24" text-anchor="middle"
      font-family="'SF Mono','JetBrains Mono','Fira Mono',monospace"
      font-size="12" fill="#2a2a40">aegiscode — ~/project</text>

<!-- Terminal content -->
<g font-family="'SF Mono','JetBrains Mono','Fira Mono','Courier New',monospace"
   font-size="13" clip-path="url(#win)">

  <!-- ASCII logo (ink-flow: each line staggers in) -->
  <text class="l1" x="28" y="76"  fill="#7c6fd4">   ╔═╗╔═╗╔═╗╦╔═╗</text>
  <text class="l2" x="28" y="93"  fill="#7c6fd4">   ╠═╣║╣ ║ ╦║╚═╗</text>
  <text class="l3" x="28" y="110" fill="#7c6fd4">   ╩ ╩╚═╝╚═╝╩╚═╝</text>

  <!-- Name + version beside logo rows 2-3 -->
  <text class="l4" x="200" y="93"  fill="#00e5c0" font-weight="bold">✻ </text>
  <text class="l4" x="218" y="93"  fill="#e8e6f4" font-weight="bold">aegiscode</text>
  <text class="l5" x="218" y="110" fill="#44405a">  v2.0.0</text>

  <!-- Tagline -->
  <text class="l6" x="42" y="132" fill="#44405a">AI-powered terminal coding agent</text>

  <!-- Divider -->
  <text class="l7" x="42" y="150" fill="#1a1a28">────────────────────────────────────────</text>

  <!-- Commands list -->
  <text class="l8"  x="42" y="170">
    <tspan fill="#00e5c0">/help       </tspan><tspan fill="#44405a">all commands</tspan>
  </text>
  <text class="l9"  x="42" y="188">
    <tspan fill="#00e5c0">/model      </tspan><tspan fill="#44405a">switch AI model</tspan>
  </text>
  <text class="l10" x="42" y="206">
    <tspan fill="#00e5c0">/theme      </tspan><tspan fill="#44405a">change appearance</tspan>
  </text>
  <text class="l11" x="42" y="224">
    <tspan fill="#00e5c0">/compact    </tspan><tspan fill="#44405a">compress context</tspan>
  </text>

  <!-- Footer -->
  <text class="l12" x="42" y="244" fill="#44405a">Ctrl+C exit  ·  Ctrl+F search</text>

  <!-- Input box (border + ◆ nib) -->
  <rect class="l12" x="14" y="256" width="832" height="36" rx="6"
        fill="#060610" stroke="#1a1a2a" stroke-width="1"/>
  <text class="l12" x="28" y="280" fill="#00e5c0" font-weight="bold">◆</text>

  <!-- Status bar -->
  <text class="l12" x="28" y="302" fill="#1e1c30">─ model:</text>
  <text class="l12" x="91" y="302" fill="#1e1c30" font-weight="bold">claude-sonnet-4-6</text>
  <text class="l12" x="264" y="302" fill="#1e1c30"> · msgs:2 · sid:aX7k ─</text>

  <!-- User types a message + cursor -->
  <text class="inp" x="48" y="280" fill="#e8e6f4">add semantic memory to the auth flow</text>
  <!-- Cursor: appears with input text, then blinks -->
  <rect class="cur" x="332" y="267" width="2" height="16" fill="#00e5c0"/>

  <!-- Separator after submit -->
  <text class="inp" x="28" y="322" fill="#12121e">──────────────────────────────────────────────────────────────────────────────────────────</text>

  <!-- Thinking indicator -->
  <text class="inp" x="28" y="344">
    <tspan fill="#00e5c0">⠸ </tspan>
    <tspan fill="#44405a" font-style="italic">thinking</tspan>
    <tspan fill="#44405a"> · 38w...</tspan>
  </text>

  <!-- Tool call 1: Read -->
  <rect class="t1" x="14" y="354" width="832" height="22" rx="4" fill="#060820"/>
  <text class="t1" x="28" y="370">
    <tspan fill="#22c55e">● </tspan>
    <tspan fill="#8882a4">Read(</tspan><tspan fill="#44405a">src/auth/middleware.ts</tspan><tspan fill="#8882a4">)</tspan>
    <tspan fill="#1e1e3a">  0.9s</tspan>
  </text>

  <!-- Tool call 2: Edit -->
  <rect class="t2" x="14" y="380" width="832" height="22" rx="4" fill="#060820"/>
  <text class="t2" x="28" y="396">
    <tspan fill="#22c55e">● </tspan>
    <tspan fill="#8882a4">Edit(</tspan><tspan fill="#44405a">src/auth/middleware.ts</tspan><tspan fill="#8882a4">)</tspan>
    <tspan fill="#1e1e3a">  1.1s</tspan>
  </text>

  <!-- Tool call 3: Edit -->
  <rect class="t3" x="14" y="406" width="832" height="22" rx="4" fill="#060820"/>
  <text class="t3" x="28" y="422">
    <tspan fill="#22c55e">● </tspan>
    <tspan fill="#8882a4">Edit(</tspan><tspan fill="#44405a">src/auth/session.ts</tspan><tspan fill="#8882a4">)</tspan>
    <tspan fill="#1e1e3a">  0.8s</tspan>
  </text>

  <!-- Response -->
  <text class="r1" x="28" y="448" fill="#e8e6f4">✓ Done. Auth middleware now injects semantic context on each</text>
  <text class="r2" x="28" y="466" fill="#e8e6f4">request and stores session embeddings on logout.</text>

  <!-- New prompt ready -->
  <rect class="r3" x="14" y="478" width="832" height="36" rx="6"
        fill="#060610" stroke="#1a1a2a" stroke-width="1"/>
  <text class="r3" x="28" y="502" fill="#00e5c0" font-weight="bold">◆</text>
  <text class="r3" x="48" y="502" fill="#2a2a40">Type a message... (Ctrl+C to exit)</text>

</g>
</svg>
