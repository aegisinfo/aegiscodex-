<?xml version="1.0" encoding="UTF-8"?>
<!--
  aegiscode demo — v2.2.1
  Layout matches WelcomeMessage.tsx exactly:
    logo (3 lines) → version → tagline → divider → commands → footer → input
  12s loop: 0–45% reveal, 45–82% conversation, 82–91% hold, 91–99% fade, gap→restart
-->
<svg width="860" height="520" viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes f03 {0%,2%  {opacity:0}  4%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f06 {0%,5%  {opacity:0}  7%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f09 {0%,8%  {opacity:0} 10%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f13 {0%,12% {opacity:0} 14%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f17 {0%,16% {opacity:0} 18%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f21 {0%,20% {opacity:0} 22%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f25 {0%,24% {opacity:0} 26%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f29 {0%,28% {opacity:0} 30%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f33 {0%,32% {opacity:0} 34%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f37 {0%,36% {opacity:0} 38%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f41 {0%,40% {opacity:0} 42%,82%{opacity:1} 91%,100%{opacity:0}}
    @keyframes f45 {0%,44% {opacity:0} 46%,82%{opacity:1} 91%,100%{opacity:0}}

    @keyframes s52 {0%,51%{opacity:0;transform:translateY(6px)} 54%,82%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0}}
    @keyframes s58 {0%,57%{opacity:0;transform:translateY(6px)} 60%,82%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0}}
    @keyframes s64 {0%,63%{opacity:0;transform:translateY(6px)} 66%,82%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0}}
    @keyframes s70 {0%,69%{opacity:0;transform:translateY(5px)} 72%,82%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0}}
    @keyframes s76 {0%,75%{opacity:0;transform:translateY(5px)} 78%,82%{opacity:1;transform:translateY(0)} 91%,100%{opacity:0}}

    @keyframes blink {0%,49%{opacity:1} 50%,100%{opacity:0}}

    @keyframes eblue {
      0%  {fill:#0044EE} 8%  {fill:#0066FF} 17% {fill:#0088FF}
      25% {fill:#00AAFF} 33% {fill:#00CCFF} 42% {fill:#00EEFF}
      50% {fill:#00FFFF} 58% {fill:#00EEFF} 67% {fill:#00CCFF}
      75% {fill:#00AAFF} 83% {fill:#0088FF} 92% {fill:#0066FF}
      100%{fill:#0044EE}
    }
    @keyframes eflicker {
      0%,9%,11%,100%{opacity:1} 10%{opacity:0.15}
      44%,46%       {opacity:1} 45%{opacity:0.35}
    }

    .l1  {animation:f03 12s linear infinite}
    .l2  {animation:f06 12s linear infinite}
    .l3  {animation:f09 12s linear infinite}
    .l4  {animation:f13 12s linear infinite}
    .l5  {animation:f17 12s linear infinite}
    .l6  {animation:f21 12s linear infinite}
    .l7  {animation:f25 12s linear infinite}
    .l8  {animation:f29 12s linear infinite}
    .l9  {animation:f33 12s linear infinite}
    .l10 {animation:f37 12s linear infinite}
    .l11 {animation:f41 12s linear infinite}
    .inp {animation:f45 12s linear infinite}
    .t1  {animation:s52 12s linear infinite}
    .t2  {animation:s58 12s linear infinite}
    .t3  {animation:s64 12s linear infinite}
    .r1  {animation:s70 12s linear infinite}
    .r2  {animation:s76 12s linear infinite}
    .cur {animation:f45 12s linear infinite, blink 0.9s step-end infinite}
    .gen-wrap {animation:f45 12s linear infinite}
    .gen-txt  {animation:eblue 1.1s linear infinite, eflicker 7.7s linear infinite}
  </style>

  <clipPath id="win"><rect width="860" height="520" rx="10"/></clipPath>

  <!-- Background glow behind logo (no filter on text — keeps chars crisp) -->
  <radialGradient id="logoglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#00e5c0" stop-opacity="0.14"/>
    <stop offset="100%" stop-color="#00e5c0" stop-opacity="0"/>
  </radialGradient>

  <!-- Teal gradient behind tool-call rows -->
  <linearGradient id="toolbg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00e5c0" stop-opacity="0.07"/>
    <stop offset="60%"  stop-color="#00e5c0" stop-opacity="0.02"/>
    <stop offset="100%" stop-color="#00e5c0" stop-opacity="0"/>
  </linearGradient>

  <!-- Dot grid -->
  <pattern id="dp" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.65" fill="#00e5c0" opacity="0.055"/>
  </pattern>
</defs>

<!-- ── Canvas ── -->
<rect width="860" height="520" rx="10" fill="#04040c"/>
<rect width="860" height="520" rx="10" fill="url(#dp)"/>

<!-- ── Title bar ── -->
<rect width="860" height="38" rx="10" fill="#07070f" clip-path="url(#win)"/>
<rect y="28" width="860" height="10" fill="#07070f"/>
<rect y="37" width="860" height="1"  fill="#101020"/>
<circle cx="18" cy="19" r="5.5" fill="#ff5f57"/>
<circle cx="36" cy="19" r="5.5" fill="#febc2e"/>
<circle cx="54" cy="19" r="5.5" fill="#28c840"/>
<text x="430" y="24" text-anchor="middle"
      font-family="'SF Mono','JetBrains Mono','Fira Mono',monospace"
      font-size="12" fill="#242438">aegis — ~/project</text>

<!-- ── Terminal content ── -->
<g font-family="'JetBrains Mono','SF Mono','Fira Mono','Courier New',monospace"
   font-size="13.5" clip-path="url(#win)">

  <!-- Ambient glow behind logo (background rect, not a text filter) -->
  <ellipse class="l3" cx="148" cy="88" rx="130" ry="38" fill="url(#logoglow)"/>

  <!--
    ASCII logo — three lines, 2-space indent (matching WelcomeMessage.tsx).
    NO filter on the text so box-drawing characters render crisp.
    line-height ≈ 18px at font-size 13.5
  -->
  <text class="l1" x="34" y="68"  fill="#00e5c0" font-weight="bold">  ╔═╗╔═╗╔═╗╦╔═╗</text>
  <text class="l2" x="34" y="86"  fill="#00e5c0" font-weight="bold">  ╠═╣║╣ ║ ╦║╚═╗</text>
  <text class="l3" x="34" y="104" fill="#00e5c0" font-weight="bold">  ╩ ╩╚═╝╚═╝╩╚═╝</text>

  <!-- Version — below logo, dimmed (matches "  v2.2.1" with marginLeft=2) -->
  <text class="l4" x="44" y="120" fill="#2e2b42">    v2.2.1</text>

  <!-- Tagline — "ÆGIS  ·  terminal coding agent" (matches WelcomeMessage tagline row) -->
  <text class="l5" x="44" y="140">
    <tspan fill="#00e5c0" font-weight="bold">ÆGIS  </tspan>
    <tspan fill="#2e2b42">·  terminal coding agent</tspan>
  </text>

  <!-- Divider -->
  <text class="l6" x="44" y="158" fill="#1a1a28">──────────────────────────────────────</text>

  <!-- Commands — cmd.padEnd(12) + description (matches FadeInCommand) -->
  <text class="l7"  x="44" y="177">
    <tspan fill="#00e5c0" font-weight="bold">/help       </tspan><tspan fill="#44405a">all commands</tspan>
  </text>
  <text class="l8"  x="44" y="194">
    <tspan fill="#00e5c0" font-weight="bold">/model      </tspan><tspan fill="#44405a">switch AI model</tspan>
  </text>
  <text class="l9"  x="44" y="211">
    <tspan fill="#00e5c0" font-weight="bold">/theme      </tspan><tspan fill="#44405a">change appearance</tspan>
  </text>
  <text class="l10" x="44" y="228">
    <tspan fill="#00e5c0" font-weight="bold">/compact    </tspan><tspan fill="#44405a">compress context</tspan>
  </text>

  <!-- Footer hint -->
  <text class="l11" x="44" y="246" fill="#28243c">Ctrl+C exit  ·  Ctrl+F search</text>

  <!-- ── Input box (idle) ── -->
  <rect class="l11" x="14" y="256" width="832" height="34" rx="5"
        fill="#05050d" stroke="#15152a" stroke-width="1"/>
  <text class="l11" x="28" y="278" fill="#00e5c0" font-weight="bold">□</text>

  <!-- Status bar -->
  <text class="l11" x="28" y="300">
    <tspan fill="#00e5c0" opacity="0.35">◆ </tspan>
    <tspan fill="#1c1a2e">model:</tspan>
    <tspan fill="#1c1a2e" font-weight="bold">claude-sonnet-4-6</tspan>
    <tspan fill="#1c1a2e"> · msgs:0 · sid:aX7k ─</tspan>
  </text>

  <!-- ── User types + cursor ── -->
  <text class="inp" x="48" y="278" fill="#e8e6f4">add JWT auth to the middleware</text>
  <rect class="cur" x="336" y="265" width="2" height="15" fill="#00e5c0"/>

  <!-- Post-submit separator -->
  <text class="inp" x="28" y="316" fill="#0e0e1e">──────────────────────────────────────────────────────────────────────────────────────────</text>

  <!-- ── Electric generating indicator ── -->
  <g class="gen-wrap">
    <text class="gen-txt" x="28" y="335" font-style="italic"> generating · 2s · ~89t</text>
  </g>

  <!-- ── Tool call 1: Read ── -->
  <rect class="t1" x="14" y="343" width="3"   height="22" rx="1" fill="#00e5c0" opacity="0.55"/>
  <rect class="t1" x="17" y="343" width="829" height="22" fill="url(#toolbg)"/>
  <text class="t1" x="28" y="359">
    <tspan fill="#22c55e" font-weight="bold">✓ </tspan>
    <tspan fill="#7c78a0">Read(</tspan><tspan fill="#44405a">src/auth/middleware.ts</tspan><tspan fill="#7c78a0">)</tspan>
    <tspan fill="#1c1a2e" font-size="11">  0.9s</tspan>
  </text>

  <!-- ── Tool call 2: Edit ── -->
  <rect class="t2" x="14" y="368" width="3"   height="22" rx="1" fill="#00e5c0" opacity="0.55"/>
  <rect class="t2" x="17" y="368" width="829" height="22" fill="url(#toolbg)"/>
  <text class="t2" x="28" y="384">
    <tspan fill="#22c55e" font-weight="bold">✓ </tspan>
    <tspan fill="#7c78a0">Edit(</tspan><tspan fill="#44405a">src/auth/middleware.ts</tspan><tspan fill="#7c78a0">)</tspan>
    <tspan fill="#1c1a2e" font-size="11">  1.2s</tspan>
  </text>

  <!-- ── Tool call 3: Edit ── -->
  <rect class="t3" x="14" y="393" width="3"   height="22" rx="1" fill="#00e5c0" opacity="0.55"/>
  <rect class="t3" x="17" y="393" width="829" height="22" fill="url(#toolbg)"/>
  <text class="t3" x="28" y="409">
    <tspan fill="#22c55e" font-weight="bold">✓ </tspan>
    <tspan fill="#7c78a0">Edit(</tspan><tspan fill="#44405a">src/auth/session.ts</tspan><tspan fill="#7c78a0">)</tspan>
    <tspan fill="#1c1a2e" font-size="11">  0.8s</tspan>
  </text>

  <!-- ── Response ── -->
  <text class="r1" x="28" y="436" fill="#e8e6f4">✓  JWT middleware wired. Tokens validated on every request —</text>
  <text class="r2" x="28" y="454" fill="#e8e6f4">   sessions stored as signed cookies with a 24h TTL.</text>

  <!-- ── New input prompt (ready) ── -->
  <rect class="r2" x="14" y="465" width="832" height="34" rx="5"
        fill="#05050d" stroke="#15152a" stroke-width="1"/>
  <text class="r2" x="28" y="487" fill="#00e5c0" font-weight="bold">□</text>
  <text class="r2" x="48" y="487" fill="#28243c">Type a message... (Ctrl+C to exit)</text>

</g>
</svg>
